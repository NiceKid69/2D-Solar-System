<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System</title>
    <style>
        body {
            margin: 0;
            height: 100v;
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
            overflow: hidden;
        }
        .solar-system {
            position: relative;
            width: 800px;
            height: 800px;
        }
        .sun{
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(#ffd700, #ff8c00);
            transform: translate(-50%, -50%);
            box-shadow: 0 0 60px #ff8c00;
        }
        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1)
            border-radius: 50%
            transform: translate(-50%, -50%);
        }
        .planet {
            position: absolute;
            top: -5px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
        }
        .planet::after{
            content: attr(data-description);
            position: absolute;
            width: 200px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
            transform: translateX(-50%);
            left: 50%;
            top: 30px;
        }
        .planet:hover::after {
            visibility: visible;
            opacity: 1;
        }
        .mercury-orbit {
            width: 140px;
            height: 140px;
            animation: orbit 3s linear infinite;
        }
        .venus-orbit {
            width: 200px;
            height: 200px;
            animation: orbit 7s linear infinite;
        }
        .earth-orbit{
            width: 280px;
            height: 280px;
            animation: orbit 12s linear infinite;
        }
        .mars-orbit{
            width: 360px;
            height: 360px;
            animation: orbit 20s linear infinite;
        }
        .jupiter-orbit{
            width: 460px;
            height: 460px;
            animation: orbit 30s linear infinite;
        }
        .saturn-orbit{
            width: 540px;
            height: 540px;
            animation: orbit 40s linear infinite;
        }
        .uranus-orbit {
            width: 620px;
            height: 620px;
            animation: orbit 50s linear infinite;
        }
        .neptune-orbit {
            width: 700px;
            height: 700px;
            animation: orbit 60s linear infinite;
        }

        .mercury {
            background: #808080;
        }
        .venus {
            background: #e6b800;
        }
        .earth {
            background: #4169e1;
        }
        .mars {
            background: #ff4500;
        }
        .jupiter {
            background: #deb887;
            width: 40px;
            height: 40px;
            top: -15px;
        }
        .saturn {
            background: #ffd700;
            width: 35px;
            height: 35px;
            top: -12px;
        }
        .uranus {
            background: #40e0d0;
        }
        .neptune {
            background: #0066ff;
        }
        .moon{
            position: absolute;
            width: 8px;
            height: 8px;
            background: #c0c0c0;
            border-radius: 50%;
            top: -15px;
            left: 50%;
            animation: orbit 3s linear infinite;
        }
        @keyframes orbit {
            from {transform:rotate(0deg);}
            to {transform:rotate(360deg);}
        }
    </style>
</head>
<body>
    <div class="solar-system">
        <div class="sun"></div>
        
        <div class="orbit mercury-orbit">
            <div class="planet mercury" data-description="Mercury: The smallest and innermost planet, extremely hot during the day and cold at night."></div>
        </div>

        <div class="orbit venus-orbit">
            <div class="planet venus" data-description="Venus: Often called Earth's twin, but with a toxic atmosphere and extreme temperatures."></div>
        </div>

        <div class="orbit earth-orbit">
            <div class="planet earth" data-description="Earth: Our home planet, the only known planet with life.">
                <div class="moon"></div>
            </div>
        </div>

        <div class="orbit mars-orbit">
            <div class="planet mars" data-description="Mars: The Red Planet, featuring massive volcanoes and deep valleys."></div>
        </div>

        <div class="orbit jupiter-orbit">
            <div class="planet jupiter" data-description="Jupiter: The largest planet, known for its Great Red Spot and numerous moons."></div>
        </div>

        <div class="orbit saturn-orbit">
            <div class="planet saturn" data-description="Saturn: Famous for its beautiful ring system made of ice and rock."></div>
        </div>

        <div class="orbit uranus-orbit">
            <div class="planet uranus" data-description="Uranus: The ice giant that rotates on its side."></div>
        </div>

        <div class="orbit neptune-orbit">
            <div class="planet neptune" data-description="Neptune: The windiest planet, with speeds reaching 1,200 mph."></div>
        </div>
    </div>
</body>
</html>
