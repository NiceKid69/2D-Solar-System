<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Solar System</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #solar-system {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        .planet {
            position: absolute;
            border-radius: 50%;
            opacity: 0.8;
            animation: orbit 10s linear infinite;
        }
        #sun {
            background-color: yellow;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(150px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(150px) rotate(-360deg); }
        }
        #earth {
            animation-duration: 20s;
        }
        #moon {
            background-color: gray;
            width: 20px;
            height: 20px;
            position: absolute;
            border-radius: 50%;
            animation: orbit 2s linear infinite;
        }
        #earth:hover #moon {
            animation-duration: 1s;
        }
    </style>
</head>
<body>
    <div id="solar-system">
        <div id="sun"></div>
        <div id="mercury" class="planet" style="background-color: gray; width: 30px; height: 30px; animation-duration: 5s;"></div>
        <div id="venus" class="planet" style="background-color: orange; width: 50px; height: 50px; animation-duration: 7s;"></div>
        <div id="earth" class="planet" style="background-color: blue; width: 60px; height: 60px; animation-duration: 10s;">
            <div id="moon"></div>
        </div>
        <div id="mars" class="planet" style="background-color: red; width: 40px; height: 40px; animation-duration: 12s;"></div>
        <div id="jupiter" class="planet" style="background-color: brown; width: 80px; height: 80px; animation-duration: 15s;"></div>
        <div id="saturn" class="planet" style="background-color: gold; width: 70px; height: 70px; animation-duration: 18s;"></div>
        <div id="uranus" class="planet" style="background-color: lightblue; width: 60px; height: 60px; animation-duration: 22s;"></div>
        <div id="neptune" class="planet" style="background-color: blue; width: 55px; height: 55px; animation-duration: 25s;"></div>
    </div>
    <script>
        const planets = document.querySelectorAll('.planet');
        planets.forEach(planet => {
            planet.addEventListener('mouseover', () => {
                alert(`You are hovering over ${planet.id.charAt(0).toUpperCase() + planet.id.slice(1)}!`);
            });
        });
    </script>
</body>
</html>
