<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="solar-system">
        <div class="sun"></div>
        
        <div class="orbit mercury-orbit">
            <div class="planet mercury" data-description="Mercury: The smallest and innermost planet, extremely hot during the day and cold at night."></div>
        </div>

        <div class="orbit venus-orbit">
            <div class="planet venus" data-description="Venus: Often called Earth's twin, but with a toxic atmosphere and extreme temperatures."></div>
        </div>

        <div class="orbit earth-orbit">
            <div class="planet earth" data-description="Earth: Our home planet, the only known planet with life.">
                <div class="moon"></div>
            </div>
        </div>

        <div class="orbit mars-orbit">
            <div class="planet mars" data-description="Mars: The Red Planet, featuring massive volcanoes and deep valleys."></div>
        </div>

        <div class="orbit jupiter-orbit">
            <div class="planet jupiter" data-description="Jupiter: The largest planet, known for its Great Red Spot and numerous moons."></div>
        </div>

        <div class="orbit saturn-orbit">
            <div class="planet saturn" data-description="Saturn: Famous for its beautiful ring system made of ice and rock."></div>
        </div>

        <div class="orbit uranus-orbit">
            <div class="planet uranus" data-description="Uranus: The ice giant that rotates on its side."></div>
        </div>

        <div class="orbit neptune-orbit">
            <div class="planet neptune" data-description="Neptune: The windiest planet, with speeds reaching 1,200 mph."></div>
        </div>
    </div>
</body>
</html>
